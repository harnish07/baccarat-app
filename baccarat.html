<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Baccarat Helper</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:#0b0f14;
  color:#e9eef5;
}
.wrap{max-width:800px;margin:auto;padding:18px;}
.card{
  background:#121826;
  border:1px solid #1f2a3a;
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
}
button{
  padding:12px;
  border-radius:12px;
  border:1px solid #2b3a54;
  font-size:16px;
  cursor:pointer;
  color:white;
}
.banker{background:#12331f;border-color:#1f6b3c;}
.player{background:#1a2240;border-color:#3a56a6;}
.reset{background:#2b1a1a;border-color:#5c2a2a;}
.big{
  font-size:22px;
  font-weight:700;
  padding:12px;
  background:#0e1420;
  border-radius:12px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h2>Next Bet</h2>
<div id="next" class="big">—</div>
<div id="state"></div>
</div>

<div class="card">
<label>Base Bet ($)</label><br>
<input id="base" type="number" step="0.01" min="0.2" value="0.2"/>
<button onclick="saveBase()">Save</button>
</div>

<div class="card">
<button class="banker" onclick="result('B')">Banker (B)</button>
<button class="player" onclick="result('P')">Player (P)</button>
<button class="reset" onclick="resetAll()">Reset</button>
</div>

</div>

<script>
const BLOCKS=[
 [1,3,7],
 [15,31,63],
 [127,255,511],
 [1023,2047,4095],
 [8191,16383,32767]
];

const PATTERN=["B","P","B","B","P","B","P"];
const KEY="baccarat_auto_v1";

const defaultState={
 baseBet:0.2,
 blockIndex:0,
 amountPos:0,
 patternIndex:0,
 lossStreak:0,
 skipMode:false
};

let state=load();

function load(){
 try{return {...defaultState,...JSON.parse(localStorage.getItem(KEY))};}
 catch{return {...defaultState};}
}

function save(){
 localStorage.setItem(KEY,JSON.stringify(state));
}

function money(x){
 return (Math.round(x*100)/100).toFixed(2);
}

function recommendation(){
 const side=PATTERN[state.patternIndex%PATTERN.length];
 const block=BLOCKS[state.blockIndex];

 if(!block)
   return {side,amount:0,mode:"DONE"};

 if(state.skipMode)
   return {side,amount:0,mode:"SKIP"};

 const mult=block[state.amountPos];
 return {
   side,
   amount:state.baseBet*mult,
   mode:"BET"
 };
}

function update(){
 const r=recommendation();

 document.getElementById("next").textContent =
   `BET ${r.side==="B"?"Banker":"Player"} — $${money(r.amount)}`;

 document.getElementById("state").textContent =
   `Block ${state.blockIndex+1} | Step ${state.amountPos+1}/3 | Pattern ${(state.patternIndex%7)+1}/7 | Losses ${state.lossStreak}`;
}

function applyWin(amountPositive){

 // every win resets pattern
 state.patternIndex=0;

 if(amountPositive){
   // win with real bet → restart system
   state.blockIndex=0;
   state.amountPos=0;
   state.lossStreak=0;
   state.skipMode=false;
 }else if(state.skipMode){
   // win during $0 mode → next block
   state.skipMode=false;
   state.lossStreak=0;
   state.amountPos=0;
   state.blockIndex=Math.min(state.blockIndex+1,BLOCKS.length);
 }

 save();
 update();
}

function applyLoss(){
 state.patternIndex++;

 if(state.skipMode){
   save(); update(); return;
 }

 state.lossStreak++;
 state.amountPos=Math.min(state.amountPos+1,2);

 if(state.lossStreak>=3)
   state.skipMode=true;

 save();
 update();
}

/* ---------- AUTO WIN / LOSS ---------- */
function result(actualSide){

 const r=recommendation();

 if(r.mode==="DONE") return;

 const isWin=(actualSide===r.side);

 if(isWin)
   applyWin(r.amount>0);
 else
   applyLoss();
}

function saveBase(){
 const v=Math.max(0.2,Number(document.getElementById("base").value));
 state.baseBet=v;
 save();
 update();
}

function resetAll(){
 state={...defaultState};
 save();
 update();
}

update();
</script>
</body>
</html>
