<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Baccarat Bet Helper</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body { margin: 0; background:#0b0f14; color:#e9eef5; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 18px; }
    .card { background:#121826; border:1px solid #1f2a3a; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
    h1 { font-size: 20px; margin: 0 0 10px; }
    h2 { font-size: 16px; margin: 0 0 10px; color:#cfe0ff; }
    .row { display:flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    label { font-size: 14px; color:#b8c4d6; }
    input[type="number"]{
      background:#0e1420; color:#e9eef5; border:1px solid #273449; border-radius: 10px;
      padding: 10px 12px; font-size: 16px; width: 160px;
    }
    button{
      background:#1a2435; color:#e9eef5; border:1px solid #2b3a54; border-radius: 12px;
      padding: 10px 12px; font-size: 16px; cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    .win { background:#12331f; border-color:#1f6b3c; }
    .loss { background:#3a1616; border-color:#8b2a2a; }
    .danger { background:#2b1a1a; border-color:#5c2a2a; }
    .muted { color:#b8c4d6; font-size: 13px; }
    .big {
      font-size: 22px; font-weight: 750; letter-spacing: .2px;
      padding: 12px; border-radius: 12px; background:#0e1420; border:1px dashed #2b3a54;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #1f2a3a; font-size: 14px; }
    th { color:#b8c4d6; font-weight: 600; }
    .pill { display:inline-block; padding: 2px 10px; border-radius: 999px; border:1px solid #2b3a54; background:#0e1420; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Baccarat Bet Helper</h1>
      <div class="muted">
        Amount: 1–3–7–15–31–63–127–255–511–1023–2047–4095–8191<br/>
        Pattern: B P B B P B P (repeat)<br/>
        Rule: <b>Loss → advance</b>, <b>Win → reset</b>
      </div>
    </div>

    <div class="card">
      <h2>Settings</h2>
      <div class="row">
        <label for="baseBet">Base bet</label>
        <input id="baseBet" type="number" min="0.01" step="0.01" />
        <button id="saveBase">Save</button>
      </div>
      <div class="muted">You can use decimals like 0.2</div>
    </div>

    <div class="card">
      <h2>Next bet</h2>
      <div id="nextBet" class="big">—</div>
      <div class="muted" id="stateLine" style="margin-top:8px;"></div>

      <div class="row" style="margin-top:12px;">
        <button class="win" id="btnWin">Win</button>
        <button class="loss" id="btnLoss">Loss</button>
        <button id="btnUndo">Undo</button>
        <button class="danger" id="btnReset">Reset</button>
      </div>
    </div>

    <div class="card">
      <h2>History (latest 30)</h2>
      <div class="muted" id="historyEmpty">No hands yet.</div>
      <div style="overflow:auto;">
        <table id="historyTable" style="display:none;">
          <thead>
            <tr>
              <th>#</th><th>Bet</th><th>Amount</th><th>Result</th><th>Amount step</th><th>Pattern pos</th><th>Time</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
(() => {
  const AMOUNT_STEPS = [1,3,7,15,31,63,127,255,511,1023,2047,4095,8191];
  const SIDE_PATTERN = ["B","P","B","B","P","B","P"];
  const KEY = "baccarat_custom_v3_decimal";

  const defaultState = { baseBet: 0.2, hand: 0, a: 0, p: 0, history: [] };

  function safeParse(raw) { try { return JSON.parse(raw); } catch { return null; } }
  function load() {
    const saved = safeParse(localStorage.getItem(KEY));
    return { ...defaultState, ...(saved || {}) };
  }
  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

  function clamp(n){
    const x = Number(n);
    if (!Number.isFinite(x) || x <= 0) return defaultState.baseBet;
    return Math.round(x * 100) / 100; // keep 2 decimals
  }
  function sideName(s){ return s==="B" ? "Banker" : "Player"; }

  function recommendation(){
    const side = SIDE_PATTERN[state.p % SIDE_PATTERN.length];
    const mult = AMOUNT_STEPS[Math.min(state.a, AMOUNT_STEPS.length - 1)];
    const amount = clamp(state.baseBet) * mult;
    return { side, mult, amount: Math.round(amount * 100) / 100 };
  }

  function update(){
    baseBetEl.value = state.baseBet;

    const r = recommendation();
    nextBetEl.textContent = `${sideName(r.side)} — $${r.amount} (base $${state.baseBet} × ${r.mult})`;

    const stepShown = Math.min(state.a, AMOUNT_STEPS.length - 1) + 1;
    const patShown = (state.p % SIDE_PATTERN.length) + 1;
    stateLineEl.textContent =
      `Next hand ${state.hand + 1} • Amount step ${stepShown}/${AMOUNT_STEPS.length} • Pattern position ${patShown}/${SIDE_PATTERN.length}`;

    render();
  }

  function render(){
    const h = state.history.slice(-30);
    historyBodyEl.innerHTML = "";
    if (!h.length) {
      historyEmptyEl.style.display = "block";
      historyTableEl.style.display = "none";
      return;
    }
    historyEmptyEl.style.display = "none";
    historyTableEl.style.display = "table";

    h.forEach(x => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${x.n}</td>
        <td>${sideName(x.s)}</td>
        <td>$${x.amt}</td>
        <td>${x.r}</td>
        <td>${x.as}</td>
        <td>${x.ps}</td>
        <td>${new Date(x.t).toLocaleString()}</td>
      `;
      historyBodyEl.appendChild(tr);
    });
  }

  function log(result){
    const r = recommendation();
    const asNum = Math.min(state.a, AMOUNT_STEPS.length - 1) + 1;
    const psNum = (state.p % SIDE_PATTERN.length) + 1;

    state.history.push({
      n: state.hand + 1,
      s: r.side,
      amt: r.amount,
      r: result,
      as: `${asNum}/${AMOUNT_STEPS.length} (×${r.mult})`,
      ps: `${psNum}/${SIDE_PATTERN.length}`,
      t: Date.now(),
      prevHand: state.hand,
      prevA: state.a,
      prevP: state.p,
      prevBase: state.baseBet
    });

    state.hand += 1;

    if (result === "W") {
      state.a = 0;
      state.p = 0;
    } else {
      state.a = Math.min(state.a + 1, AMOUNT_STEPS.length - 1);
      state.p = state.p + 1;
    }

    save();
    update();
  }

  function undo(){
    const last = state.history.pop();
    if (!last) return;
    state.hand = last.prevHand;
    state.a = last.prevA;
    state.p = last.prevP;
    state.baseBet = last.prevBase;
    save();
    update();
  }

  function reset(){
    state = { ...defaultState, history: [] };
    save();
    update();
  }

  const baseBetEl = document.getElementById("baseBet");
  const saveBaseBtn = document.getElementById("saveBase");
  const nextBetEl = document.getElementById("nextBet");
  const stateLineEl = document.getElementById("stateLine");

  const btnWin = document.getElementById("btnWin");
  const btnLoss = document.getElementById("btnLoss");
  const btnUndo = document.getElementById("btnUndo");
  const btnReset = document.getElementById("btnReset");

  const historyEmptyEl = document.getElementById("historyEmpty");
  const historyTableEl = document.getElementById("historyTable");
  const historyBodyEl = document.getElementById("historyBody");

  let state = load();
  state.baseBet = clamp(state.baseBet);

  saveBaseBtn.onclick = () => { state.baseBet = clamp(baseBetEl.value); save(); update(); };
  btnWin.onclick = () => log("W");
  btnLoss.onclick = () => log("L");
  btnUndo.onclick = undo;
  btnReset.onclick = reset;

  update();
})();
</script>
</body>
</html>
