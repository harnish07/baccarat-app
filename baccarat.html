<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Baccarat Bet Helper</title>

<style>
:root{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
body{margin:0;background:#0b0f14;color:#e9eef5;}
.wrap{max-width:900px;margin:auto;padding:18px;}
.card{background:#121826;border:1px solid #1f2a3a;border-radius:14px;padding:16px;margin-bottom:14px;}
h1{font-size:20px;margin:0 0 10px;}
h2{font-size:16px;margin:0 0 10px;color:#cfe0ff;}

.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

input{
background:#0e1420;color:#e9eef5;border:1px solid #273449;
border-radius:10px;padding:10px 12px;font-size:16px;width:160px;
}

button{
background:#1a2435;color:#e9eef5;border:1px solid #2b3a54;
border-radius:12px;padding:10px 12px;font-size:16px;cursor:pointer;
}
button:hover{filter:brightness(1.08);}

.banker{background:#12331f;border-color:#1f6b3c;}
.player{background:#1a2240;border-color:#3a56a6;}
.tie{background:#3a2f12;border-color:#8b6a2a;}
.danger{background:#2b1a1a;border-color:#5c2a2a;}

.big{
font-size:22px;font-weight:750;
padding:12px;border-radius:12px;
background:#0e1420;border:1px dashed #2b3a54;
}

.muted{color:#b8c4d6;font-size:13px;}
.pill{display:inline-block;padding:2px 10px;border-radius:999px;border:1px solid #2b3a54;background:#0e1420;}
.skipTag{
color:#ffd166;
font-weight:700;
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h1>Baccarat Bet Helper</h1>
<div class="muted">
Blocks:
<span class="pill">1–3–7</span> →
<span class="pill">15–31–63</span> →
<span class="pill">127–255–511</span> →
<span class="pill">1023–2047–4095</span><br>
Pattern: <span class="pill">B P B B P B P</span><br>
Every Win resets pattern. After 3 losses → $0 until Win.
</div>
</div>

<div class="card">
<h2>Settings</h2>
<div class="row">
<input id="baseBet" type="number" min="0.2" step="0.01">
<button id="saveBase">Save</button>
</div>
</div>

<div class="card">
<h2>Next Bet</h2>
<div id="nextBet" class="big">—</div>
<div id="stateLine" class="muted" style="margin-top:8px;"></div>

<div class="row" style="margin-top:12px;">
<button class="banker" id="btnBanker">Banker</button>
<button class="player" id="btnPlayer">Player</button>
<button class="tie" id="btnTie">Tie</button>
<button class="danger" id="btnReset">Reset</button>
</div>
</div>

</div>

<script>
(() => {

const BLOCKS=[
 [1,3,7],
 [15,31,63],
 [127,255,511],
 [1023,2047,4095]
];

const PATTERN=["B","P","B","B","P","B","P"];
const KEY="baccarat_helper_state";

const defaultState={
 baseBet:0.2,
 blockIndex:0,
 amountPos:0,
 patternIndex:0,
 lossStreak:0,
 skipMode:false
};

const $=id=>document.getElementById(id);

function load(){
 try{return {...defaultState,...JSON.parse(localStorage.getItem(KEY))};}
 catch{return {...defaultState};}
}

function save(){localStorage.setItem(KEY,JSON.stringify(state));}

function money(n){return (Math.round(n*100)/100).toFixed(2);}
function sideName(s){return s==="B"?"Banker":"Player";}

function rec(){
 const betSide=PATTERN[state.patternIndex%7];
 const block=BLOCKS[state.blockIndex];

 if(!block)return{betSide,amount:0,mode:"DONE"};

 if(state.skipMode)
   return{betSide,amount:0,mode:"SKIP",blockText:block.join("-")};

 const mult=block[state.amountPos];
 return{
   betSide,
   amount:state.baseBet*mult,
   mult,
   mode:"BET",
   blockText:block.join("-")
 };
}

function update(){
 $("baseBet").value=state.baseBet;
 const r=rec();

 $("nextBet").textContent=
   `BET ${sideName(r.betSide)} — ${r.amount===0?"$0.00 (skip)":"$"+money(r.amount)}`;

 const stepText = state.skipMode
   ? `<span class="skipTag">SKIP MODE</span>`
   : `${state.amountPos+1}/3`;

 $("stateLine").innerHTML=
   `Mode:${r.mode} | Block:${r.blockText} | Step:${stepText} | Pattern:${(state.patternIndex%7)+1}/7 | Losses:${state.lossStreak}`;
}

function applyWL(resultWL,amountPositive){

 if(resultWL==="W"){
   state.patternIndex=0;

   if(amountPositive){
     state.blockIndex=0;
     state.amountPos=0;
     state.lossStreak=0;
     state.skipMode=false;
     save();update();return;
   }

   if(state.skipMode){
     state.skipMode=false;
     state.lossStreak=0;
     state.amountPos=0;
     state.blockIndex=Math.min(state.blockIndex+1,BLOCKS.length-1);
     save();update();return;
   }

   state.lossStreak=0;
   state.amountPos=0;
   save();update();return;
 }

 state.patternIndex++;

 if(state.skipMode){
   save();update();return;
 }

 state.lossStreak++;
 state.amountPos=Math.min(state.amountPos+1,2);

 if(state.lossStreak>=3)
   state.skipMode=true;

 save();update();
}

function onActualResult(side){
 const r=rec();
 if(r.mode==="DONE")return;
 const win=(side===r.betSide);
 applyWL(win?"W":"L",r.amount>0);
}

function onTie(){update();}

let state=load();

$("saveBase").onclick=()=>{state.baseBet=Math.max(0.2,Number($("baseBet").value));save();update();};
$("btnBanker").onclick=()=>onActualResult("B");
$("btnPlayer").onclick=()=>onActualResult("P");
$("btnTie").onclick=onTie;
$("btnReset").onclick=()=>{state={...defaultState};save();update();};

update();

})();
</script>
</body>
</html>
